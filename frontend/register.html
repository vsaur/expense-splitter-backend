<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Splitter - Register</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
    <div class="card">
        <h1 class="logo">💰 Expense Splitter</h1>
        <h2>Create Account</h2>
        <p class="subtitle">Join and start splitting expenses</p>

        <div id="error-msg" class="error hidden"></div>

        <form id="register-form">
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="name" placeholder="Saurav Kumar" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="saurav@gmail.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="minimum 6 characters" required>
            </div>
            <button type="submit" class="btn btn-primary" id="register-btn">
                Create Account
            </button>
        </form>

        <p class="switch-link">
            Already have an account? <a href="index.html">Login</a>
        </p>
    </div>
</div>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
